# XcodeGen spec for the Vee.app bundle. Regenerate the .xcodeproj with:
#   xcodegen generate
# The generated Vee.xcodeproj is git-ignored; CI regenerates it before building.
#
# The app target is a thin shell: it reuses the `vee` executable's entry point
# (Sources/vee) and links the VeeApp library product from the local SwiftPM
# package, so app code and library code have a single source of truth.
name: Vee
options:
  bundleIdPrefix: com.vee
  createIntermediateGroups: true
  deploymentTarget:
    macOS: "26.0"

packages:
  Vee:
    path: .

targets:
  Vee:
    type: application
    platform: macOS
    sources:
      - Sources/vee
      - path: App/Vee.icns
        buildPhase: resources
    dependencies:
      - package: Vee
        product: VeeApp
      # Sources/vee dispatches to the render/lint/new CLI subcommands.
      - package: Vee
        product: VeeCLI
      # WidgetKit + Control Center extension, embedded in the app bundle.
      - target: VeeWidgetExtension
        embed: true
    info:
      path: App/Info.plist
      properties:
        # Menu-bar-only: no Dock icon, no app-switcher entry.
        LSUIElement: true
        CFBundleName: Vee
        CFBundleDisplayName: Vee
        CFBundleIconFile: Vee
        CFBundleShortVersionString: "0.1.2"
        CFBundleVersion: "1"
        LSMinimumSystemVersion: "26.0"
        # vee:// (native) + swiftbar:// (compat) URL actions.
        CFBundleURLTypes:
          - CFBundleURLName: com.vee.app
            CFBundleURLSchemes: [vee, swiftbar]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vee.app
        PRODUCT_NAME: Vee
        MARKETING_VERSION: "0.1.2"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        # Un-sandboxed by design (arbitrary plugin execution); hardened runtime
        # for notarized Developer-ID distribution outside the Mac App Store.
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: App/Vee.entitlements
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        DEVELOPMENT_TEAM: ""

  # WidgetKit widget (plugin output on the desktop / Notification Center) + a
  # Control Center control (refresh all plugins). Runs as a separate sandboxed
  # process and talks to the app only through the App Group (VeeWidgetShared).
  VeeWidgetExtension:
    type: app-extension
    platform: macOS
    sources:
      - WidgetExtension
    dependencies:
      - package: Vee
        product: VeeWidgetShared
    info:
      path: WidgetExtension/Info.plist
      properties:
        CFBundleName: VeeWidgetExtension
        CFBundleDisplayName: Vee
        CFBundleShortVersionString: "0.1.2"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vee.app.widgets
        PRODUCT_NAME: VeeWidgetExtension
        MARKETING_VERSION: "0.1.2"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: WidgetExtension/WidgetExtension.entitlements
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        DEVELOPMENT_TEAM: ""
        # Widget extensions must not carry a main-executable Info key.
        GENERATE_INFOPLIST_FILE: NO
