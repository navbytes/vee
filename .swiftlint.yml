# SwiftLint config for Vee.
#
# The tree is kept clean of the enabled rules, and the lint.yml workflow runs
# with `--strict`, so any new warning fails the build. Size/naming rules below
# are disabled deliberately (they're high-noise for this codebase); the sharp
# correctness rules stay on.

included:
  - Sources
  - Tests

excluded:
  - .build
  - plugins
  - packaging

# High-noise / size-and-naming rules — opt back in deliberately as the code is
# brought into line.
disabled_rules:
  - line_length
  - file_length
  - type_body_length
  - function_body_length
  - function_parameter_count
  - cyclomatic_complexity
  - identifier_name
  - type_name
  - nesting
  - large_tuple
  - todo
  # Vee intentionally decodes subprocess/network bytes with the non-failable
  # `String(decoding:as:UTF8.self)` (lossy — replaces invalid scalars) rather
  # than the failable `String(bytes:encoding:)`: we must never DROP plugin
  # output on a stray invalid byte. This rule pushes the opposite, so it is off.
  - optional_data_string_conversion

# Keep the sharp correctness rules on, as errors under --strict.
force_cast: warning
force_try: warning
