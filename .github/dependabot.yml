version: 2
updates:
  # GitHub Actions used by the workflows above.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]
  # No npm or SwiftPM entries: Vee currently has no external dependencies (all
  # Swift targets are first-party). Re-add an npm entry when the TypeScript
  # plugin SDK lands (Stage 8).
