name: Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  swiftlint:
    # macos-26 to match the project's macOS 26 deployment target (Liquid Glass).
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7
      - name: Install SwiftLint
        run: brew install swiftlint
      # Hard gate: the tree is kept clean of the enabled rules, so `--strict`
      # turns any remaining warning into a build failure.
      - name: SwiftLint
        run: swiftlint lint --strict --reporter github-actions-logging
