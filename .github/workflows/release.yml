name: Release

# Push a semver tag (v*) to cut a release: build Vee.app (Release) and publish a
# zip to a GitHub Release.
#
# NOTE: Developer-ID signing + notarization + stapling land in Stage 7. Until
# then the published app is ad-hoc signed, so a downloaded copy needs a one-time
# right-click → Open to pass Gatekeeper.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    # macos-26: the release build targets .macOS("26.0") (Liquid Glass).
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6

      - name: Create + push tag (manual dispatch only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git tag -a "${{ inputs.tag }}" -m "Release ${{ inputs.tag }}"
          git push origin "${{ inputs.tag }}"

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: Build Vee.app (Release)
        run: >
          xcodebuild -project Vee.xcodeproj -scheme Vee -configuration Release
          -derivedDataPath .build/xcode
          CODE_SIGNING_ALLOWED=NO build

      - name: Package
        run: |
          APP=.build/xcode/Build/Products/Release/Vee.app
          ditto -c -k --keepParent "$APP" Vee.zip

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          files: Vee.zip
          fail_on_unmatched_files: true
