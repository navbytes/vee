name: Audit

# Dependency vulnerability scan for the npm side (plugin SDK + esbuild pipeline).
# The Swift side has no external SwiftPM dependencies (all targets are first-party),
# so there is nothing to scan there. Mirrors nt's govulncheck — including the
# weekly cron to catch newly-disclosed CVEs in existing deps.
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 9 * * 1" # weekly

jobs:
  npm-audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugins
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: plugins/package-lock.json
      - run: npm ci
      - name: npm audit (fail on high/critical)
        run: npm audit --audit-level=high
