name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    # Nightly reliability soak (the `soak` job below is gated to these events).
    - cron: '0 7 * * *'

# Cancel superseded runs on a PR; let main runs finish.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  swift:
    name: Build & test (SwiftPM)
    # macos-26: the package targets .macOS("26.0") (Liquid Glass), which older
    # SDKs cannot build. All logic lives in library targets and is covered here.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Toolchain
        run: swift --version
      - name: Build
        run: swift build
      - name: Test
        run: swift test

  app:
    name: Build Vee.app (xcodebuild)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      # The .xcodeproj is generated from project.yml, not committed.
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate project
        run: xcodegen generate
      # Signing is exercised in the release workflow; here we only verify the
      # app target compiles, links, and bundles.
      - name: Build app (unsigned)
        run: >
          xcodebuild -project Vee.xcodeproj -scheme Vee -configuration Debug
          -derivedDataPath .build/xcode
          CODE_SIGNING_ALLOWED=NO build

  soak:
    name: Reliability soak (memory + refresh)
    # Opt-in: runs nightly and on manual dispatch only — never on every PR — so
    # normal CI stays fast. Proves the bounded-memory / no-refresh-death moat by
    # driving the real execution/refresh pipeline for a sustained window.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Toolchain
        run: swift --version
      - name: Soak benchmark (VEE_SOAK=1)
        env:
          VEE_SOAK: "1"
          VEE_SOAK_DURATION_SECONDS: "120"
        run: swift test --filter MemorySoakBenchmarkTests

  plugins:
    name: Plugin SDK (TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugins
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      # No dependencies to install — the SDK is zero-dep and Node runs the
      # TypeScript directly. `npm test` runs the fixture drift guard.
      - name: Test (fixture drift guard)
        run: npm test

  plugins-python:
    name: Plugin SDK (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugins/python
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      # Zero-dep, standard-library only. The drift guard asserts each example's
      # build() output matches its golden fixture (shared with the TS SDK).
      - name: Test (fixture drift guard)
        run: python3 -m unittest discover -s test -v
