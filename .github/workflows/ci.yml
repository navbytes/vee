name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on a PR; let main runs finish.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  swift:
    name: Build & test (SwiftPM)
    # macos-26: the package targets .macOS("26.0") (Liquid Glass), which older
    # SDKs cannot build. All logic lives in library targets and is covered here.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Toolchain
        run: swift --version
      - name: Build
        run: swift build
      - name: Test
        run: swift test

  app:
    name: Build Vee.app (xcodebuild)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      # The .xcodeproj is generated from project.yml, not committed.
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate project
        run: xcodegen generate
      # Signing is exercised in the release workflow; here we only verify the
      # app target compiles, links, and bundles.
      - name: Build app (unsigned)
        run: >
          xcodebuild -project Vee.xcodeproj -scheme Vee -configuration Debug
          -derivedDataPath .build/xcode
          CODE_SIGNING_ALLOWED=NO build

  plugins:
    name: Plugin SDK (TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugins
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      # No dependencies to install — the SDK is zero-dep and Node runs the
      # TypeScript directly. `npm test` runs the fixture drift guard.
      - name: Test (fixture drift guard)
        run: npm test
