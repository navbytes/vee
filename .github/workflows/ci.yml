name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on a PR; let main runs finish.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  swift:
    name: Build & test (SwiftPM)
    # macOS (not ubuntu) because the app links AppKit/JavaScriptCore. macos-15
    # ships Xcode 16+, i.e. the Swift 6 toolchain that Package.swift requires
    # (swift-tools-version: 6.0).
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Toolchain
        run: swift --version
      - name: Build
        run: swift build
      - name: Test
        run: swift test

  plugins:
    name: Plugins (TypeScript / esbuild)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugins
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: plugins/package-lock.json
      - run: npm ci
      # Rebuild the bundles, then run the node suite — which asserts the committed
      # fixtures in plugins/fixtures match a fresh esbuild build (drift guard).
      # This mirrors nt's "verify committed dist/ is up to date" check.
      - name: Build bundles
        run: npm run build:once
      - name: Test (node --test) + fixture-drift check
        run: npm test
